<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in — Vridhi</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="auth-wrap">
  <div class="auth-visual">
    <div class="glow"></div>
    <a class="brand" href="index.html" style="position:relative">
      <svg class="brand-mark" viewBox="0 0 40 40" fill="none">
        <circle cx="20" cy="20" r="17" stroke="#E8A33D" stroke-width="3" stroke-dasharray="80 26.9"/>
        <path d="M13 23c2-7 5-10 7-13 2 3 5 6 7 13" stroke="#6FA98A" stroke-width="2.4" stroke-linecap="round" fill="none"/>
      </svg>
      <div>
        <div class="brand-word">Vridhi</div>
        <div class="brand-sub">Growth Intelligence</div>
      </div>
    </a>
    <p class="auth-quote">"Three sides, <span>one shared truth</span> about how a child is really doing."</p>
    <div style="font-size:12.5px;color:var(--ink-soft);position:relative">— Vridhi, hackathon build</div>
  </div>

  <div class="auth-panel">
    <div class="eyebrow">Welcome back</div>
    <h1>Sign in to Vridhi</h1>
    <p class="sub">Choose your side, then sign in with your credentials.</p>

    <div class="role-select" id="role-select">
      <div class="role-card" data-role="owner">
        <svg class="ric" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 21h18M5 21V8l7-4 7 4v13M9 21v-6h6v6M9 12h.01M15 12h.01M9 9h.01M15 9h.01"/></svg>
        <div class="rname">Org Owner</div>
      </div>
      <div class="role-card" data-role="teacher">
        <svg class="ric" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20V4H6.5A2.5 2.5 0 0 0 4 6.5v13Z"/><path d="M8 7h8M8 11h6"/></svg>
        <div class="rname">Teacher</div>
      </div>
      <div class="role-card" data-role="student">
        <svg class="ric" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="m2 9 10-5 10 5-10 5-10-5Z"/><path d="M6 11v5c0 1.5 3 3 6 3s6-1.5 6-3v-5"/></svg>
        <div class="rname">Student / Parent</div>
      </div>
    </div>
    <p id="role-hint" style="font-size:12.5px;color:var(--ink-soft);margin:-14px 0 20px"></p>

    <form id="signin-form">
      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="you@school.edu" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" placeholder="Your password" required>
      </div>

      <div class="form-foot">
        <label style="display:flex;align-items:center;gap:7px"><input type="checkbox" style="width:auto"> Remember me</label>
        <a href="#">Forgot password?</a>
      </div>

      <button class="btn btn-primary btn-block" id="auth-submit" type="submit">Sign in</button>
    </form>

    <div class="auth-switch">New to Vridhi? <a href="signup.html">Create an account</a></div>
  </div>
</div>

<script src="js/app.js"></script>
<script>
  const getRole = initRoleSelect('student');
  handleAuthSubmit('signin-form', getRole);
</script>
</body>
</html>
